<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#030712">
    <meta name="color-scheme" content="dark">
    <title>Niko AI — Giriş Yap</title>
    <link rel="icon" type="image/png" href="/niko-icon.png">
    <link rel="apple-touch-icon" href="/niko-icon.png">
    <link rel="stylesheet" href="/auth.css?v=6">
</head>
<body>
    <a class="auth-skip" href="#username">Forma atla</a>
    <div class="bg-mesh" aria-hidden="true"></div>
    <div class="bg-grid" aria-hidden="true"></div>

    <div class="auth-page">
        <main class="auth-main">
            <div class="auth-container">
                <div class="auth-card">
                    <header class="auth-header">
                        <div class="logo-container">
                            <div class="logo-glow-ring"></div>
                            <img src="/niko-icon.png" alt="Niko AI" class="logo-mark-img" width="60" height="60" decoding="async">
                        </div>
                        <h1 class="auth-logo">Giriş yap</h1>
                        <p class="auth-subtitle">Hesabınızla sohbete devam edin</p>
                    </header>

                    <form id="loginForm" class="auth-form" novalidate>
                        <div id="errorMessage" class="error-message" style="display:none;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                            </svg>
                            <span class="msg-text"></span>
                        </div>

                        <div class="form-group">
                            <label for="username">Kullanıcı adı</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                                </svg>
                                <input
                                    type="text"
                                    id="username"
                                    name="username"
                                    class="input-control"
                                    placeholder="kullanici_adiniz"
                                    required
                                    autocomplete="username"
                                    spellcheck="false"
                                >
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="password">Şifre</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                                </svg>
                                <input
                                    type="password"
                                    id="password"
                                    name="password"
                                    class="input-control"
                                    placeholder="••••••••"
                                    required
                                    autocomplete="current-password"
                                >
                            </div>
                        </div>

                        <button type="submit" class="auth-button" id="submitBtn">
                            <span class="button-text">Giriş yap</span>
                            <div class="button-loader" style="display:none;" aria-hidden="true"></div>
                        </button>
                    </form>

                    <footer class="auth-footer">
                        Hesabınız yok mu? <a href="signup.html">Kayıt ol</a>
                    </footer>
                </div>
            </div>
        </main>
    </div>

    <script>
        if (localStorage.getItem('token')) window.location.href = '/';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username   = document.getElementById('username').value.trim();
            const password   = document.getElementById('password').value;
            const errEl      = document.getElementById('errorMessage');
            const submitBtn  = document.getElementById('submitBtn');
            const btnText    = submitBtn.querySelector('.button-text');
            const btnLoader  = submitBtn.querySelector('.button-loader');

            errEl.style.display = 'none';

            if (!username || !password) {
                showError('Lütfen tüm alanları doldurun.');
                return;
            }

            setLoading(true);

            try {
                const res  = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('username', username);
                    window.location.href = '/';
                } else {
                    showError(data.error || 'Giriş başarısız. Lütfen kullanıcı adı ve şifrenizi kontrol edin.');
                }
            } catch {
                showError('Bağlantı hatası. İnternet bağlantınızı kontrol edin.');
            } finally {
                setLoading(false);
            }

            function setLoading(on) {
                submitBtn.disabled = on;
                btnText.style.display   = on ? 'none'  : 'block';
                btnLoader.style.display = on ? 'block' : 'none';
            }

            function showError(msg) {
                errEl.querySelector('.msg-text').textContent = msg;
                errEl.style.display = 'flex';
            }
        });
    </script>
</body>
</html>
