<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niko AI - E-posta Doğrulama</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/auth.css">
</head>
<body>
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-logo">Niko AI</h1>
                <p class="auth-subtitle">E-posta adresinizi doğrulayın</p>
            </div>
            
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 24px; font-size: 14px;">
                <span id="displayEmail" style="color: var(--text-main); font-weight: 500;">...</span> adresine 6 haneli bir kod gönderdik.
            </p>

            <form id="verifyForm" class="auth-form">
                <div class="code-wrapper">
                    <input type="text" class="code-input" maxlength="1" pattern="\d" required autofocus>
                    <input type="text" class="code-input" maxlength="1" pattern="\d" required>
                    <input type="text" class="code-input" maxlength="1" pattern="\d" required>
                    <input type="text" class="code-input" maxlength="1" pattern="\d" required>
                    <input type="text" class="code-input" maxlength="1" pattern="\d" required>
                    <input type="text" class="code-input" maxlength="1" pattern="\d" required>
                </div>
                
                <div id="errorMessage" class="error-message" style="display: none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                    <span class="msg-text"></span>
                </div>

                <div id="successMessage" class="success-message" style="display: none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    <span class="msg-text"></span>
                </div>
                
                <button type="submit" class="auth-button" id="submitBtn">
                    <span class="button-text">Doğrula</span>
                    <div class="button-loader" style="display: none;"></div>
                </button>
            </form>
            
            <div class="verify-timer" id="timerContainer">
                Yeni kod için bekleyin: <span id="timer">01:00</span>
            </div>
            
            <a id="resendBtn" class="resend-link disabled">Kodu tekrar gönder</a>

            <div class="auth-footer">
                <p><a href="login.html">Giriş sayfasına dön</a></p>
            </div>
        </div>
    </div>

    <script>
        const email = localStorage.getItem('pendingVerificationEmail') || 'E-posta';
        document.getElementById('displayEmail').textContent = email;

        const inputs = document.querySelectorAll('.code-input');
        const form = document.getElementById('verifyForm');
        const resendBtn = document.getElementById('resendBtn');
        const timerSpan = document.getElementById('timer');

        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value.length === 0 && index > 0) {
                    inputs[index - 1].focus();
                }
            });
            
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const data = e.clipboardData.getData('text').trim();
                if (data.length === 6 && /^\d+$/.test(data)) {
                    data.split('').forEach((char, i) => {
                        inputs[i].value = char;
                    });
                    inputs[5].focus();
                }
            });
        });

        let timeLeft = 60;
        function updateTimer() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            timerSpan.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            
            if (timeLeft <= 0) {
                resendBtn.classList.remove('disabled');
                document.getElementById('timerContainer').style.display = 'none';
            } else {
                timeLeft--;
                setTimeout(updateTimer, 1000);
            }
        }
        updateTimer();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const code = Array.from(inputs).map(i => i.value).join('');
            if (code.length !== 6) return;

            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            const submitBtn = document.getElementById('submitBtn');
            const buttonText = submitBtn.querySelector('.button-text');
            const buttonLoader = submitBtn.querySelector('.button-loader');

            errorMessage.style.display = 'none';
            submitBtn.disabled = true;
            buttonText.style.display = 'none';
            buttonLoader.style.display = 'block';

            try {
                const response = await fetch('/email/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code })
                });

                const data = await response.json();

                if (response.ok) {
                    successMessage.querySelector('.msg-text').textContent = 'Doğrulama başarılı! Yönlendiriliyorsunuz...';
                    successMessage.style.display = 'flex';
                    localStorage.removeItem('pendingVerificationEmail');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    errorMessage.querySelector('.msg-text').textContent = data.error || 'Geçersiz kod';
                    errorMessage.style.display = 'flex';
                }
            } catch (err) {
                errorMessage.querySelector('.msg-text').textContent = 'Bağlantı hatası';
                errorMessage.style.display = 'flex';
            } finally {
                submitBtn.disabled = false;
                buttonText.style.display = 'block';
                buttonLoader.style.display = 'none';
            }
        });

        resendBtn.addEventListener('click', async () => {
            if (resendBtn.classList.contains('disabled')) return;
            
            try {
                const response = await fetch('/email/resend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (response.ok) {
                    timeLeft = 60;
                    resendBtn.classList.add('disabled');
                    document.getElementById('timerContainer').style.display = 'block';
                    updateTimer();
                }
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>
</html>
