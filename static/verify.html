<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niko AI — E-posta Doğrulama</title>
    <link rel="icon" type="image/png" href="/static/icons/niko_icon_8.png">
    <link rel="apple-touch-icon" href="/static/icons/niko_icon_8.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/auth.css">
    <style>
        .email-icon-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            border-radius: 18px;
            background: rgba(37,99,235,0.1);
            border: 1px solid rgba(37,99,235,0.2);
            margin: 0 auto 20px;
        }

        .email-icon-wrap img {
            width: 56px;
            height: 56px;
            object-fit: contain;
            border-radius: 14px;
        }

        .verify-desc {
            text-align: center;
            color: var(--text-muted);
            font-size: 13.5px;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .verify-desc strong {
            color: var(--text-main);
            font-weight: 600;
        }

        /* Animated focus ring on active input */
        .code-input:focus {
            transform: translateY(-1px);
        }

        .code-input.filled {
            border-color: rgba(37,99,235,0.45);
            background: rgba(37,99,235,0.08);
            color: #93c5fd;
        }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>
    <div class="bg-grid"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="email-icon-wrap">
                    <img src="/static/icons/niko_icon_8.png" alt="Niko AI" decoding="async">
                </div>
                <h1 class="auth-logo">E-posta Doğrulama</h1>
                <p class="auth-subtitle">Gelen kutunuzu kontrol edin</p>
            </div>

            <p class="verify-desc">
                <strong id="displayEmail">…</strong> adresine<br>6 haneli doğrulama kodu gönderdik.
            </p>

            <form id="verifyForm" class="auth-form" novalidate>
                <div class="code-wrapper">
                    <input type="text" class="code-input" inputmode="numeric" maxlength="1" pattern="\d" required autofocus>
                    <input type="text" class="code-input" inputmode="numeric" maxlength="1" pattern="\d" required>
                    <input type="text" class="code-input" inputmode="numeric" maxlength="1" pattern="\d" required>
                    <input type="text" class="code-input" inputmode="numeric" maxlength="1" pattern="\d" required>
                    <input type="text" class="code-input" inputmode="numeric" maxlength="1" pattern="\d" required>
                    <input type="text" class="code-input" inputmode="numeric" maxlength="1" pattern="\d" required>
                </div>

                <div id="errorMessage" class="error-message" style="display:none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <span class="msg-text"></span>
                </div>

                <div id="successMessage" class="success-message" style="display:none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    <span class="msg-text"></span>
                </div>

                <button type="submit" class="auth-button" id="submitBtn">
                    <span class="button-text">Doğrula</span>
                    <div class="button-loader" style="display:none;"></div>
                </button>
            </form>

            <div class="verify-timer" id="timerContainer">
                Yeni kod için bekleyin: <span id="timer">01:00</span>
            </div>

            <a id="resendBtn" class="resend-link disabled">Kodu tekrar gönder</a>

            <div class="auth-footer">
                <a href="login.html">← Giriş sayfasına dön</a>
            </div>
        </div>
    </div>

    <script>
        /* ── Display email ── */
        const email = localStorage.getItem('pendingVerificationEmail') || 'E-posta';
        document.getElementById('displayEmail').textContent = email;

        /* ── Code inputs ── */
        const inputs = document.querySelectorAll('.code-input');

        inputs.forEach((input, idx) => {
            input.addEventListener('input', (e) => {
                const val = e.target.value.replace(/\D/g, '');
                e.target.value = val;
                if (val) {
                    input.classList.add('filled');
                    if (idx < inputs.length - 1) inputs[idx + 1].focus();
                } else {
                    input.classList.remove('filled');
                }
                // Auto-submit when all filled
                if ([...inputs].every(i => i.value)) submitForm();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace') {
                    if (!e.target.value && idx > 0) {
                        inputs[idx - 1].focus();
                        inputs[idx - 1].value = '';
                        inputs[idx - 1].classList.remove('filled');
                    }
                }
                if (e.key === 'ArrowLeft' && idx > 0) inputs[idx - 1].focus();
                if (e.key === 'ArrowRight' && idx < inputs.length - 1) inputs[idx + 1].focus();
            });

            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const text = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
                if (text.length === 6) {
                    text.split('').forEach((char, i) => {
                        inputs[i].value = char;
                        inputs[i].classList.add('filled');
                    });
                    inputs[5].focus();
                    setTimeout(submitForm, 80);
                }
            });

            input.addEventListener('focus', () => {
                input.select();
            });
        });

        /* ── Timer ── */
        const resendBtn     = document.getElementById('resendBtn');
        const timerSpan     = document.getElementById('timer');
        const timerContainer = document.getElementById('timerContainer');
        let timeLeft = 60;
        let timerID;

        function updateTimer() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            timerSpan.textContent = `${m}:${s}`;
            if (timeLeft <= 0) {
                resendBtn.classList.remove('disabled');
                timerContainer.style.display = 'none';
                return;
            }
            timeLeft--;
            timerID = setTimeout(updateTimer, 1000);
        }
        updateTimer();

        /* ── Submit ── */
        document.getElementById('verifyForm').addEventListener('submit', (e) => {
            e.preventDefault();
            submitForm();
        });

        async function submitForm() {
            const code = [...inputs].map(i => i.value).join('');
            if (code.length !== 6) return;

            const errEl     = document.getElementById('errorMessage');
            const okEl      = document.getElementById('successMessage');
            const submitBtn = document.getElementById('submitBtn');
            const btnText   = submitBtn.querySelector('.button-text');
            const btnLoader = submitBtn.querySelector('.button-loader');

            errEl.style.display = 'none';
            submitBtn.disabled  = true;
            btnText.style.display   = 'none';
            btnLoader.style.display = 'block';

            try {
                const res  = await fetch('/email/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code })
                });
                const data = await res.json();

                if (res.ok) {
                    okEl.querySelector('.msg-text').textContent = 'Doğrulama başarılı! Yönlendiriliyorsunuz…';
                    okEl.style.display = 'flex';
                    localStorage.removeItem('pendingVerificationEmail');
                    setTimeout(() => window.location.href = 'login.html', 1800);
                } else {
                    errEl.querySelector('.msg-text').textContent = data.error || 'Geçersiz kod. Lütfen tekrar deneyin.';
                    errEl.style.display = 'flex';
                    // shake inputs
                    inputs.forEach(i => { i.value = ''; i.classList.remove('filled'); });
                    inputs[0].focus();
                }
            } catch {
                errEl.querySelector('.msg-text').textContent = 'Bağlantı hatası. Lütfen tekrar deneyin.';
                errEl.style.display = 'flex';
            } finally {
                submitBtn.disabled  = false;
                btnText.style.display   = 'block';
                btnLoader.style.display = 'none';
            }
        }

        /* ── Resend ── */
        resendBtn.addEventListener('click', async () => {
            if (resendBtn.classList.contains('disabled')) return;

            try {
                const res = await fetch('/email/resend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (res.ok) {
                    clearTimeout(timerID);
                    timeLeft = 60;
                    resendBtn.classList.add('disabled');
                    timerContainer.style.display = 'block';
                    updateTimer();
                }
            } catch (err) {
                console.error('Resend error:', err);
            }
        });
    </script>
</body>
</html>
