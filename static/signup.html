<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niko AI - Kayıt</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/auth.css">
</head>
<body>
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-logo">Niko AI</h1>
                <p class="auth-subtitle">Yeni bir hesap oluşturun</p>
            </div>
            
            <form id="signupForm" class="auth-form">
                <div class="form-group">
                    <label for="username">Kullanıcı Adı</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Kullanıcı adınız"
                        required
                        autocomplete="username"
                        minlength="3"
                        maxlength="30"
                    >
                    <span class="field-hint">En az 3 karakter. Harf, rakam ve alt çizgi.</span>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Şifre</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="••••••••"
                            required
                            autocomplete="new-password"
                            minlength="8"
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">Tekrar</label>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            placeholder="••••••••"
                            required
                            autocomplete="new-password"
                        >
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="email">E-posta (Opsiyonel)</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="ad@email.com"
                        autocomplete="email"
                    >
                </div>
                
                <div class="form-group">
                    <label for="fullName">Ad Soyad (Opsiyonel)</label>
                    <input 
                        type="text" 
                        id="fullName" 
                        name="fullName" 
                        placeholder="Adınız ve soyadınız"
                        autocomplete="name"
                    >
                </div>
                
                <div id="errorMessage" class="error-message" style="display: none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                    <span class="msg-text"></span>
                </div>

                <div id="successMessage" class="success-message" style="display: none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    <span class="msg-text"></span>
                </div>
                
                <button type="submit" class="auth-button" id="submitBtn">
                    <span class="button-text">Hesap Oluştur</span>
                    <div class="button-loader" style="display: none;"></div>
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Zaten bir hesabınız var mı? <a href="login.html">Giriş Yap</a></p>
            </div>
        </div>
    </div>

    <script>
        function validateUsername(username) {
            if (username.length < 3 || username.length > 30) return 'Kullanıcı adı 3-30 karakter arasında olmalıdır';
            if (!/^[a-zA-Z]/.test(username)) return 'Kullanıcı adı bir harf ile başlamalıdır';
            if (!/^[a-zA-Z][a-zA-Z0-9_]*$/.test(username)) return 'Kullanıcı adı sadece harf, rakam ve alt çizgi içerebilir';
            return null;
        }
        
        function validatePassword(password) {
            if (password.length < 8) return 'Şifre en az 8 karakter olmalıdır';
            if (!/[A-Z]/.test(password)) return 'Şifre en az bir büyük harf içermelidir';
            if (!/[a-z]/.test(password)) return 'Şifre en az bir küçük harf içermelidir';
            if (!/[0-9]/.test(password)) return 'Şifre en az bir rakam içermelidir';
            return null;
        }
        
        function validateEmail(email) {
            if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return 'Geçerli bir e-posta adresi girin';
            return null;
        }
        
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const email = document.getElementById('email').value.trim();
            const fullName = document.getElementById('fullName').value.trim();
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            const submitBtn = document.getElementById('submitBtn');
            const buttonText = submitBtn.querySelector('.button-text');
            const buttonLoader = submitBtn.querySelector('.button-loader');
            
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            let error = validateUsername(username);
            if (!error) error = validatePassword(password);
            if (!error && password !== confirmPassword) error = 'Şifreler eşleşmiyor';
            if (!error) error = validateEmail(email);
            
            if (error) {
                errorMessage.querySelector('.msg-text').textContent = error;
                errorMessage.style.display = 'flex';
                return;
            }
            
            submitBtn.disabled = true;
            buttonText.style.display = 'none';
            buttonLoader.style.display = 'block';
            
            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username,
                        password,
                        email: email || null,
                        full_name: fullName || null
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    if (email) {
                        try {
                            await fetch('/email/send-verification', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ email, username })
                            });
                            localStorage.setItem('pendingVerificationEmail', email);
                            successMessage.querySelector('.msg-text').textContent = 'Kayıt başarılı! Doğrulama sayfasına yönlendiriliyorsunuz...';
                            successMessage.style.display = 'flex';
                            setTimeout(() => { window.location.href = 'verify.html'; }, 2000);
                        } catch (err) {
                            window.location.href = 'login.html';
                        }
                    } else {
                        successMessage.querySelector('.msg-text').textContent = 'Kayıt başarılı! Giriş sayfasına yönlendiriliyorsunuz...';
                        successMessage.style.display = 'flex';
                        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                    }
                } else {
                    errorMessage.querySelector('.msg-text').textContent = data.error || 'Kayıt başarısız.';
                    errorMessage.style.display = 'flex';
                }
            } catch (error) {
                errorMessage.querySelector('.msg-text').textContent = 'Bağlantı hatası.';
                errorMessage.style.display = 'flex';
            } finally {
                submitBtn.disabled = false;
                buttonText.style.display = 'block';
                buttonLoader.style.display = 'none';
            }
        });
        
        if (localStorage.getItem('token')) {
            window.location.href = '/';
        }
    </script>
</body>
</html>
